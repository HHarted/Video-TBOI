<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    font-family:Arial, sans-serif;
}

/* fundo blur */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center,#1a1a1a,#000);
    filter:blur(40px);
    z-index:-1;
}

/* caixa do vídeo */
.player{
    background:rgba(20,20,20,0.7);
    backdrop-filter:blur(10px);
    padding:15px;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* vídeo */
video{
    width:90vw;
    max-width:900px;
    border-radius:12px;
}

</style>
</head>

<body>

<div class="player">
<video controls playsinline>
<source src="VideoTBOI.mp4" type="video/mp4">
Seu navegador não suporta vídeo.
</video>
</div>

</body>
</html>
